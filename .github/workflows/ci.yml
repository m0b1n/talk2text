name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Enable caching of the uv cache
          enable-cache: true
          # Optionally force a specific version
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        # uv sync is faster and ensures your lockfile is up to date
        run: uv sync --frozen

      - name: Run Linting (Ruff)
        # Since uv projects usually use Ruff (also by Astral)
        run: uv run ruff check .

      - name: Run Tests
        # uv run handles the virtualenv context automatically
        run: uv run pytest